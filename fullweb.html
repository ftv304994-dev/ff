<!DOCTYPE html>
<html>      
<head>
    <title>3AMAZON - Online Store</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* Prevent horizontal overflow */
* {
  box-sizing: border-box;
}
html, body {
  max-width: 100%;
  overflow-x: hidden;
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff512f, #ff9966);
}

/* NAVBAR */
.nav {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap; /* allow wrapping on small screens */
  gap: 5px;
  background: linear-gradient(to right, #ff0000, #ff7300, #ffcc00);
  min-height: 70px;
  padding: 5px 10px;
  position: sticky;
  top: 0;
  z-index: 1000;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}

/* NAV LINKS */
.nav a {
  color: white;
  text-decoration: none;
  font-size: 14px;
  padding: 4px 6px;
  white-space: nowrap;
  transition: 0.3s;
  cursor: pointer;
}

/* ICONS */
.nav a[href="fullweb.html"]::before { content: "🏠 "; }
.nav a[href="about-us.html"]::before { content: "ℹ️ "; }
.nav a[href="cart.html"]::before { content: "🛒 "; }
.nav a[href="order.html"]::before { content: "📦 "; }
.nav a[href="g-mail.html"]::before { content: "👤 "; }

/* hide total to prevent overflow */
#total { display: none; }

.nav a:hover {
  background: rgba(255,255,255,0.2);
  border-radius: 8px;
}

/* LOGO */
.amazon {
  font-size: 18px;
  font-weight: bold;
}

/* SEARCH BAR */
.bar {
  width: 90%;
  max-width: 300px;
  padding: 10px;
  display: block;
  margin: 10px auto;
  border: none;
  border-radius: 20px;
  outline: none;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}

/* DELETE BUTTON */
.delete {
  display: block;
  margin: 10px auto;
  background: linear-gradient(to right, #ff0000, #ff7300);
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
}

.delete:hover {
  background: linear-gradient(to right, #cc0000, #ff5500);
  transform: scale(1.05);
}

/* PRODUCTS GRID */
#products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* PRODUCT CARD */
.product-card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
  text-align: center;
  transition: 0.3s;
}

.product-card:hover {
  transform: translateY(-8px) scale(1.02);
}

/* IMAGE */
.product-image {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
}

/* TEXT */
.product-title {
  margin: 10px 0;
  color: #ff5500;
}

.product-description {
  font-size: 14px;
  color: #555;
}

.product-price {
  font-weight: bold;
  color: #ff0000;
  margin: 10px 0;
}

/* ADD BUTTON */
.add-btn, .remove-btn {
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
}

/* QUANTITY BOX */
.quantity-box {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
}

/* INPUT */
.qty-input {
  width: 60px;
  padding: 5px;
  text-align: center;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 16px;
}

/* ADD/REMOVE BUTTONS */
.add-btn {
  background: linear-gradient(to right, #ff0000, #ff9900);
  color: white;
  border: none;
  padding: 8px 12px;
}

.add-btn:hover {
  background: linear-gradient(to right, #cc0000, #ff6600);
  transform: scale(1.05);
}

.remove-btn {
  background: linear-gradient(to right, #444, #000);
  color: white;
  border: none;
  padding: 8px 12px;
}

.remove-btn:hover {
  background: #000;
  transform: scale(1.05);
}

/* 📱 PHONES FIX */
@media (max-width: 600px) {
  .nav a {
    font-size: 12px;
    padding: 4px 5px;
  }
  .amazon {
    font-size: 16px;
  }
  #products {
    grid-template-columns: repeat(1, 1fr);
    gap: 10px;
    padding: 10px;
      max-width: 100%;

  }
  .product-image {
    height: 120px;
  }
  .product-title, .product-price {
    font-size: 14px;
  }
  .qty-input {
    width: 45px;
    font-size: 14px;
  }
  .add-btn, .remove-btn {
    padding: 6px 10px;
    font-size: 12px;
  }
}
</style>
<body>

<script src="products.js"></script>
<div class="nav">
    <a href="fullweb.html" class="amazon">3AMAZON</a>
    <a href="about-us.html">about us</a>
    <a href="cart.html" id="cart" onclick="saveCart()">cart</a>
    <a href="order.html">order</a>
    <a class="e" id="reset" onclick="resetCart();updatePrice(0);updateCart()">reset</a>
    <a href="g-mail.html" onclick="window.location.href='g-mail.html'">login</a>
</div>

<input class="bar" type="text" id="searchInput" placeholder="Search...">
<button id="delete" class="delete">delete</button>

<div class="container" id="products"></div>

<script>
// Render products with quantity controls
const container = document.getElementById("products");
const delet = document.getElementById("delete");
let cartnum = Number(localStorage.getItem("cartnum")) || 0;
let totalnum = Number(localStorage.getItem("totalnum")) || 0;
let items = JSON.parse(localStorage.getItem("cartItems")) || [];
let total = {textContent:""};

products.forEach(product => {
  container.innerHTML += `
    <div class="product-card">
      <img src="${product.image}" class="product-image">
      <h3 class="product-title">${product.name}</h3>
      <p class="product-description">${product.description}</p>
      <p class="product-price">$${product.price}</p>
      <div class="quantity-box">
        <button class="add-btn" onclick="applyQty('${product.name}', ${product.price}, 'add')">Add</button>
        <input type="number" min="1" value="1" id="qty-${product.name}" class="qty-input">
        <button class="remove-btn" onclick="applyQty('${product.name}', ${product.price}, 'remove')">Remove</button>
      </div>
    </div>
  `;
});
    const searchInput = document.getElementById("searchInput");

searchInput.addEventListener("input", function () {
  const searchValue = this.value.toLowerCase();

  const productCards = document.querySelectorAll(".product-card");

  productCards.forEach(card => {
    const title = card.querySelector(".product-title").textContent.toLowerCase();
    const description = card.querySelector(".product-description").textContent.toLowerCase();
    const price = card.querySelector(".product-price").textContent.toLowerCase();

    if (
      title.includes(searchValue) ||
      description.includes(searchValue) )
   {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
    delet.addEventListener("click", function() {
      searchInput.value = "";
      productCards.forEach(card => {
        card.style.display = "block";
      });
      });
    });
    return searchValue;
  });

function applyQty(name, price, action) {
  let qtyInput = document.getElementById(`qty-${name}`);
  let qty = Number(qtyInput.value);
  if (qty <= 0) return;

  let item = items.find(i => i.name === name);
  if (!item && action === "add") {
    item = { name: name, price: Number(price), quantity: 0 };
    items.push(item);
  }
  if (item) {
    if (action === "add") {
      item.quantity += qty;
      totalnum += price * qty;
    } else if (action === "remove") {
      item.quantity -= qty;
      totalnum -= price * qty;
      if (item.quantity <= 0) items = items.filter(i => i.name !== name);
    }
    if (totalnum < 0) totalnum = 0;
  }
  cartnum = items.reduce((sum, i) => sum + i.quantity, 0);
  updateCart();
  saveCart();
}

function updateCart() {
  document.getElementById("cart").textContent = `cart(${cartnum})`;
}

function saveCart() {
  localStorage.setItem("cartnum", cartnum);
  localStorage.setItem("totalnum", totalnum);
  localStorage.setItem("cartItems", JSON.stringify(items));
}

function resetCart() {
  cartnum = 0;
  totalnum = 0;
  items = [];
  updateCart();
  saveCart();
}

window.onload = () => {
  updateCart();
};
</script>
</body>
</html>
