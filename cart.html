<!DOCTYPE html>
<html>
<head>
    <title>full webb Web</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff512f, #ff9966);
}

/* MAIN */
.main {
  min-height: 100vh;
}

/* NAVBAR */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  background: linear-gradient(to right, #ff0000, #ff7300, #ffcc00);
  color: white;
  padding: 0 20px;
  position: sticky;
  top: 0;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}

/* LOGO */
.w {
  font-size: 28px;
  font-weight: bold;
  cursor: pointer;
  color: white;
  transition: 0.3s;
}

/* ICONS */
.w:first-child::before { content: "🏠 "; }  /* Home */
.w:nth-child(2)::before { content: "🛒 "; } /* Cart */

.q:nth-of-type(1)::before { content: "💰 "; }
.q:nth-of-type(2)::before { content: "📦 "; }

/* HOVER */
.w:hover {
  transform: scale(1.1);
}

/* INFO TEXT */
.q {
  font-size: 18px;
}

/* PRODUCT GRID */
.item-list {
  list-style-type: none;
  padding: 20px;
  margin: 0;

  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}

/* PRODUCT CARD */
.item-list li {
  background: white;
  padding: 15px;
  border-radius: 15px;
  font-size: 16px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
  transition: 0.3s;
}

/* HOVER EFFECT */
.item-list li:hover {
  transform: translateY(-8px) scale(1.02);
}

/* TABLETS */
@media (max-width:1000px){
  .item-list {
    grid-template-columns: repeat(3,1fr);
  }

  .w {
    font-size: 22px;
  }

  .q {
    font-size: 16px;
  }
}

/* PHONES */
@media (max-width:600px){
  .item-list {
    grid-template-columns: repeat(2,1fr);
  }

  .nav {
    height: 60px;
  }

  .w {
    font-size: 18px;
  }

  .q {
    font-size: 14px;
  }
}
</style>
</head>
<body>
    <div class="main">
        <div class="nav">
<p class="w" onclick="window.location.href='fullweb.html'">3AMAZON</p>
<p class="w">Cart</p> 
<p class="q">Total: $<span id="totalDisplay"></span></p>
<p class="q">Items in cart: <span id="cartDisplay"></span></p>
       </div>




<ul class="item-list" id="itemsList"></ul>
</div>

<script>
const cartnum = Number(localStorage.getItem("cartnum")) || 0;
const totalnum = Number(localStorage.getItem("totalnum","quantity")) || 0;
const cartItems = JSON.parse(localStorage.getItem("cartItems")) || [];
document.getElementById("cartDisplay").textContent = cartnum;
document.getElementById("totalDisplay").textContent = totalnum;

// Display items in the cart
const itemsList = document.getElementById("itemsList");
cartItems.forEach(item => {
    const listItem = document.createElement("li");
    listItem.textContent = `${item.name} - $${item.price}- Quantity: ${item.quantity}`;
    itemsList.appendChild(listItem);
});

    </script>
</body>

</html>
