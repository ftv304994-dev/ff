<!DOCTYPE html>
<html>
<head>
    <title>Full Web Chat</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .yo {
            position: fixed;
            display: flex;
            top: 10px;
            left: 10px;
        }
        .nop {
            width: 200px;
            padding: 20px;
            border: 1px solid black;
            margin-bottom: 20px;
            word-wrap: break-word;
        }
        .n {
            color: black;
            width: 300px;
            padding: 10px;
            word-wrap: break-word;
            white-space: normal;
        }
        #container {
            margin-top: 80px;
        }
    </style>
</head>
<body>
    <input class="yo" type="text" id="key" placeholder="Type something...">
    <div id="container"></div>

    <script>
        const key = document.getElementById("key");
        const container = document.getElementById("container");

        // Handle Enter key
        key.addEventListener("keydown", function(event) {
            if (event.key === "Enter" && key.value.trim() !== "") {
                // Create a new div for the message
                const div = document.createElement("div");
                div.className = "nop";

                const p = document.createElement("p");
                p.className = "n";
                p.textContent = key.value;

                div.appendChild(p);
                container.appendChild(div);

                // Scroll to bottom
                container.scrollTop = container.scrollHeight;

                key.value = ""; // Clear input
            }
        });
    </script>
</body>
</html>
